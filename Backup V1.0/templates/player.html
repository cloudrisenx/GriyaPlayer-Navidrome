<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>GriyaPlayer Web</title>
    <!-- MENGGANTI ICON GLOBE JADI GP.PNG -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='gp.png') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --bg: #000; --panel: #121212; --elevated: #181818; --accent: #1db954; --text: #fff; --muted: #a7a7a7; --hover: #2a2a2a; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }

        .main-container { display: grid; grid-template-columns: 240px 1fr; gap: 8px; padding: 8px; flex: 1; overflow: hidden; position: relative; min-height: 0; }
        .sidebar { background: var(--panel); border-radius: 8px; padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .content { background: linear-gradient(180deg, #222222 0%, var(--panel) 100%); border-radius: 8px; overflow-y: auto; padding: 24px 32px; position: relative; }

        .logo { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; padding-left: 12px; }
        .user-profile { background: #000; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .user-profile .avatar { background: var(--elevated); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); }
        .user-profile .u-name { font-weight: 700; font-size: 14px; text-transform: capitalize;}
        .user-profile small { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;}
        
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px; color: var(--muted); cursor: pointer; font-weight: 600; font-size: 14px; border-radius: 6px; text-decoration: none; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .nav-item:hover { color: #fff; }
        .nav-item.active { color: #fff; background: var(--elevated); }

        .sidebar-playlists { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); }

        .header-title { font-size: 42px; font-weight: 800; margin-bottom: 24px; letter-spacing: -1px; }
        .btn-green { background: var(--accent); border: none; padding: 14px 32px; border-radius: 50px; font-weight: 700; cursor: pointer; margin-bottom: 32px; font-size: 14px; color: #000; transition: transform 0.1s; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-green:hover { transform: scale(1.04); background: #1ed760; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 20px; }
        th { text-align: left; color: var(--muted); font-size: 12px; padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 10px 16px; font-size: 14px; color: var(--muted); border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: 0.1s; }
        tr:hover td { background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
        .col-idx { width: 50px; text-align: center; }
        .col-title { width: 45%; color: #fff; font-weight: 500; }
        .col-album { width: 35%; }
        .col-dur { width: 100px; text-align: right; }

        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; margin-top: 20px; }
        .album-card { background: var(--elevated); padding: 16px; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        .album-card:hover { background: var(--hover); }
        .album-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .album-card .a-title { font-weight: 700; color: #fff; font-size: 15px; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .album-card .a-artist { color: var(--muted); font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .playlist-search-area { margin-top: 40px; padding-top: 20px; border-top: 1px solid #333; }
        .playlist-search-area h3 { font-size: 20px; margin-bottom: 16px; color: #fff; }
        .search-box { display: flex; align-items: center; background: #2a2a2a; border-radius: 4px; padding: 12px 16px; gap: 12px; margin-bottom: 20px;}
        .search-box input { flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; outline: none; }
        .search-result-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--elevated); margin-bottom: 8px; border-radius: 6px; }
        .search-result-item:hover { background: var(--hover); }
        .btn-add-outline { border: 1px solid var(--muted); background: transparent; color: #fff; border-radius: 20px; padding: 6px 16px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .btn-add-outline:hover { border-color: #fff; transform: scale(1.05); }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.2s; backdrop-filter: blur(5px); }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { background: var(--panel); width: 400px; border-radius: 8px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 16px; border: 1px solid #333; transform: translateY(20px); transition: 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-content h3 { color: #fff; font-size: 20px; text-align: center; margin-bottom: 8px;}
        .modal-body { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        .pl-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; background: var(--elevated); }
        .pl-item:hover { background: var(--hover); }
        .pl-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .pl-item .pl-name { color: #fff; font-weight: 600; font-size: 14px; flex: 1; }
        .modal-footer { display: flex; gap: 8px; margin-top: 8px; }
        .modal-footer input { flex: 1; background: #2a2a2a; border: none; color: #fff; padding: 10px 14px; border-radius: 4px; outline: none; font-size: 13px; }

        .player-bar { background: #000; height: 90px; display: grid; grid-template-columns: 30% 40% 30%; align-items: center; padding: 0 16px; border-top: 1px solid #222; flex-shrink: 0; }
        .track-info { display: flex; align-items: center; gap: 14px; }
        .track-info img { width: 56px; height: 56px; border-radius: 4px; background: #282828; object-fit: cover; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .ctrl-btns { display: flex; align-items: center; gap: 24px; font-size: 20px; color: var(--muted); }
        .ctrl-btns i:hover:not(.active) { color: #fff; cursor: pointer; }
        .ctrl-btns i.active { color: var(--accent); cursor: pointer; }
        .play-main-btn { font-size: 38px; color: #fff; transition: 0.1s; cursor: pointer; }
        .play-main-btn:hover { transform: scale(1.05); }
        .progress-container { width: 100%; max-width: 600px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); font-weight: 500;}
        #seekSlider { flex: 1; accent-color: #fff; cursor: pointer; height: 4px; }
        #seekSlider:hover { accent-color: var(--accent); }
        
        .volume-container { display: flex; align-items: center; gap: 10px; justify-content: flex-end; color: var(--muted); padding-right: 16px; }
        #volumeSlider { width: 90px; accent-color: #fff; cursor: pointer; height: 4px; }
        #volumeSlider:hover { accent-color: var(--accent); }
        
        .mode-switch { display: flex; align-items: center; gap: 6px; background: #282828; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--muted); transition: 0.3s; margin-right: 15px; border: 1px solid #333; text-transform: uppercase; }
        .mode-switch:hover { color: #fff; background: #333; }
        .mode-switch.alone { background: var(--accent); color: #000; border-color: var(--accent); }

        .side-panel { position: absolute; right: 8px; top: 8px; bottom: 8px; width: 320px; background: var(--elevated); transform: translateX(120%); transition: transform 0.3s ease; z-index: 100; padding: 24px; border-radius: 8px; box-shadow: -4px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .side-panel.open { transform: translateX(0); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-weight: 800; color: #fff; font-size: 18px; }
        .panel-close { cursor: pointer; font-size: 24px; color: var(--muted); }
        .panel-close:hover { color: #fff; }
        .queue-content { flex: 1; overflow-y: auto; }
        .queue-item { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: var(--muted); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .queue-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .queue-item.active { color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="logo"><i class='bx bxl-spotify' style="font-size: 32px;"></i> GriyaPlayer</div>
            
            <div class="user-profile">
                <div class="avatar"><i class='bx bxs-user'></i></div>
                <div>
                    <small>Ruangan Aktif</small>
                    <div class="u-name">{{ username }}</div>
                </div>
            </div>

            <div class="nav-item active" id="nav-home" onclick="loadLibrary()"><i class='bx bxs-home' style="font-size: 24px;"></i> Beranda</div>
            <div class="nav-item" id="nav-album" onclick="loadAlbums()"><i class='bx bx-album' style="font-size: 24px;"></i> Album</div>
            
            <div class="nav-item" id="nav-playlist" onclick="loadPlaylists()"><i class='bx bxs-collection' style="font-size: 24px;"></i> Library Saya</div>
            <div class="sidebar-playlists" id="sidebar-playlists"></div>
            
            <div class="nav-item" onclick="doLogout()" style="color: #ff4d4d; margin-top: auto;"><i class='bx bx-log-out' style="font-size: 24px;"></i> Keluar</div>
        </div>

        <div class="content">
            <h1 class="header-title" id="page-title">Beranda Musik</h1>
            <button class="btn-green" id="main-play-btn" onclick="playAllFromUI()"><i class='bx bx-play' style="font-size: 20px;"></i> PUTAR SEMUA</button>
            <div id="dynamic-content"></div>
        </div>

        <div id="queuePanel" class="side-panel">
            <div class="panel-header">
                <span>Antrian</span>
                <i class='bx bx-x panel-close' onclick="togglePanel('queuePanel')"></i>
            </div>
            <div id="queueContainer" class="queue-content">Antrian kosong.</div>
        </div>
    </div>

    <div id="playlistModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content">
            <h3>Tambahkan ke Playlist</h3>
            <div class="modal-body" id="modalPlaylistList"></div>
            <div class="modal-footer">
                <input type="text" id="newPlaylistInput" placeholder="Nama playlist baru...">
                <button class="btn-green" style="margin:0; padding: 10px 20px; font-size: 12px;" onclick="createAndAddPlaylist()">Buat</button>
            </div>
        </div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <img id="c_img" src="" style="background: #282828;">
            <div>
                <div id="c_title" style="font-weight:600; font-size: 14px; color:#fff; margin-bottom: 4px;">Pilih Lagu</div>
                <div id="c_artist" style="font-size:12px; color:var(--muted)">-</div>
            </div>
        </div>

        <div class="controls">
            <div class="ctrl-btns">
                <i class='bx bx-shuffle' id="shuffleBtn" onclick="cmd('shuffle')"></i>
                <i class='bx bx-skip-previous' onclick="cmd('prev')"></i>
                <i class='bx bx-play-circle play-main-btn' id="p_btn" onclick="cmd('play')"></i>
                <i class='bx bx-skip-next' onclick="cmd('next')"></i>
                <i class='bx bx-repeat' id="repeatBtn" onclick="cmd('repeat')"></i>
                <i class='bx bx-list-ul' id="queueBtn" onclick="togglePanel('queuePanel')" title="Antrian"></i>
            </div>
            <div class="progress-container">
                <span id="t_cur">0:00</span>
                <input type="range" id="seekSlider" min="0" max="100" value="0" step="0.1" oninput="window.handleDrag(this.value)" onchange="window.handleSeek(this.value)">
                <span id="t_max">0:00</span>
            </div>
        </div>
        
        <div class="volume-container">
            <div class="mode-switch" id="modeToggle" onclick="togglePlayMode()" title="Ubah mode pemutaran">
                <i class='bx bx-speaker' id="modeIcon" style="font-size: 16px;"></i>
                <span id="modeText">RUANGAN</span>
            </div>
            <i class='bx bx-volume-full' id="volumeIcon"></i>
            <input type="range" id="volumeSlider" min="0" max="100" value="100">
        </div>
    </div>

    <audio id="web-audio" preload="none" src=""></audio>

    <script>
        const STREAM_PORT = "{{ stream_port }}";
        function togglePanel(panelId) { document.getElementById(panelId).classList.toggle('open'); }
    </script>
    <script src="{{ url_for('static', filename='player.js') }}"></script>
</body>
</html>
